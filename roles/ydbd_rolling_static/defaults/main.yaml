---

# ydbops_local - control cluster from localhost
# values: false - use any static host for cluster control
#         true  - use localhost for cluster control
# Default value: false
ydbops_local: true

availability_mode: strong

ydb_enforce_user_token_requirement: true

ydbops_release_url: https://github.com/ydb-platform/ydbops/releases/latest/download

ansible_ssh_common_args: ""
# ydbops_log      - Local file for YDBOPS logs
ydbops_log:
# ydbops_duration - CMS will release the node for maintenance for duration * restart-retry-number seconds. 
#                   Any maintenance after that would be considered a regular cluster failure (default 60)
ydbops_duration: 60

# Skip HC. It's useful some cases (for example in migration)
healthcheck_skip: false