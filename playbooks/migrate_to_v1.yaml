---

# PLAYBOOK: ydb_platform.ydb.migrate_to_v1
# PROPOSE : This playbook is designed for migration from V2 to V1 configuration
#           
# EXAMPLE:
#
# ansible-playbook ydb_platform.ydb.migrate_to_v1
#

# https://ydb.tech/docs/ru/devops/configuration-management/migration/migration-to-v1?version=v25.2
# Steps (every step is tagged with tag like 'step-N'):
# - name: Get current cluster config with --v2-internal-state (step 1)
# - name: Set self_management_config.enabled to false (step 2)
# - name: Push updated config to cluster via cluster config replace (step 3)
# - name: Restart static nodes (step 4)
# - name: Restart dynamic nodes (step 4)
# - name: Get current cluster config without --v2-internal-state (step 5)
# - name: Save V1 static config to all nodes (step 6)
# - name: Update systemd service for storage nodes (step 7)
# - name: Reload systemd (step 7)
# - name: Restart static nodes (step 7)
# - name: Save V1 config for dynamic nodes (extra step 8)
# - name: Update systemd service for dynamic nodes (extra step 8)
# - name: Reload systemd (extra step 8)
# - name: Restart dynamic nodes (extra step 8)
# - name: Restore cfg directory and backup config-dir (extra step 9)

- hosts: "{{ groups['ydbd_static'] if 'ydbd_static' in groups else groups['ydb'] }}"
  become: true

  roles:
  - role: preflight
    tags:
      - always

  tasks:

  - name: "Check YDB Cluster configuration version"
    block:
    - name: "Get current YDB Cluster configuration (via URI)"
      ansible.builtin.uri:
        url: https://localhost:8765/counters/counters=config/subsystem%3Dconfigs_dispatcher/prometheus
        method: GET
        validate_certs: false
        return_content: true
        timeout: 30
        status_code: 200
      register: config_response

    - name: "Extract ConfigurationV2 line from response"
      set_fact:
        current_config_version: >-
          {{ config_response.content
            | regex_findall('^ConfigurationV2.*$', multiline=true)
            | first | default('') }}
      when: config_response.status == 200 and config_response.content is not none

    - name: "Fail if configuration could not be retrieved"
      ansible.builtin.fail:
        msg: >
          Failed to retrieve YDB configuration.
          Status: {{ config_response.status }},
          Error: {{ config_response.msg | default('No error message') }}
      when: >
        config_response.status is not defined or
        config_response.status != 200 or
        current_config_version == ''

    - name: "Check current YDB Cluster configuration is not V1"
      ansible.builtin.assert:
        that:
        - "current_config_version is defined"
        - "current_config_version == 'ConfigurationV2 1'"
        fail_msg: "Current cluster config is wrong: {{ current_config_version }}"    
    tags:
      - check
      - version

  - name: "Check current services for YDB storage"
    block:
    - name: generate random temporary config file path
      set_fact:
        ydb_temp_service_path: "/tmp/ydbd-storage-{{ ansible_date_time.epoch }}-{{ 999999 | random }}.service"

    - name: create static node systemd unit
      ansible.builtin.template:
        src: ../roles/ydbd_static/templates/ydbd-storage.service
        dest: "{{ ydb_temp_service_path }}"
      vars:
        ydb_config_v2: true
    
    - name: Get diff
      ansible.builtin.command:
        cmd: diff -u "{{ ydb_storage_service_filename }}" "{{ ydb_temp_service_path }}"
      register: diff_result
      ignore_errors: true
    
    - name: Remove temporary file
      ansible.builtin.file:
        path: "{{ ydb_temp_service_path }}"
        state: absent

    - name: Set facts
      set_fact:
        file_diff: "{{ diff_result.stdout }}"
        files_are_identical: "{{ diff_result.rc == 0 }}"
        diff_exit_code: "{{ diff_result.rc }}"

    - name: Debug output
      ansible.builtin.debug:
        msg:
          - "Files identical: {{ files_are_identical }}"
          - "Diff output: {{ file_diff }}"

    - name: "Ask user confirmation for updating services"
      ansible.builtin.pause:
        prompt: 'RISK OF DATA LOSS: the current service `ydbd-storage` is different. Shall we continue migration and rewrite this service?'
      register: prompt
      when: files_are_identical|bool == False
      run_once: true

    - name: "Stop execution"
      ansible.builtin.fail:
        msg: "aborting playbook execution"
      when: files_are_identical|bool == False and prompt.user_input != "yes"

    tags:
      - check
      - service

# - Get ydb token for CLI operations
  - name: Get ydb token with user credentials
    ydb_platform.ydb.get_token:
      ydb_bin: "{{ ydb_dir }}/bin/ydb"
      ca_file: "{{ ydb_dir }}/certs/ca.crt"
      endpoint: "grpcs://{{ ydb_front | default(ydb_brokers | flatten(levels=1) | first) }}:2135"
      database: "/{{ ydb_domain }}"
      user: "{{ ydb_user }}"
      password: "{{ ydb_password }}"
      retry_on_ssl_error: true
    run_once: true
    register: ydb_credentials
    until: "'token' in ydb_credentials"
    retries: 5
    delay: 20
    become: true
    tags:
      - token
      - always

# Step 1. Fetch current cluster config with --v2-internal-state
# ydb -e grpc://<node.ydb.tech>:2135 admin cluster config fetch --v2-internal-state > config.yaml
  - name: Get current cluster config (step 1)
    ydb_platform.ydb.cluster_config:
      ydb_bin: "{{ ydb_dir }}/bin/ydb"
      ld_library_path: "{{ ydb_dir }}/lib"
      ca_file: "{{ ydb_dir }}/certs/ca.crt"
      endpoint: "grpcs://{{ ydb_front | default(inventory_hostname) }}:2135"
      token: "{{ ydb_credentials.token }}"
      mode: "fetch-v2"
    run_once: true
    become: true
    register: current_cluster_config
    until: current_cluster_config is succeeded
    retries: 30
    delay: 15
    tags:
      - config
      - step-1

# Step 2. Set self_management_config.enabled: false
  - name: Generate new config (step 2)
    ydb_platform.ydb.migration:
      static_config:  "{{ ydb_config_dict }}"
      dynamic_config: "{{ current_cluster_config.config }}"
      output_file:    "{{ ansible_config_file | dirname }}/ydb_cluster_config_v2.yaml"
      mode: "v1-self-management"
    run_once: true
    become: false
    delegate_to: localhost
    tags:
      - config
      - step-2

# Step 3. Push updated config to cluster
# ydb -e grpc://<node.ydb.tech>:2135 admin cluster config replace -f config.yaml
  - name: Save config to storage nodes (step 3)
    ansible.builtin.copy:
      src: "{{ ansible_config_file | dirname }}/ydb_cluster_config_v2.yaml"
      dest: "{{ ydb_dir }}/cfg/ydbd-config-static.yaml"
      force: true
    become: true
    tags:
      - config
      - step-3

  - name: Update cluster configuration using YDB config management V1 (step 3)
    ydb_platform.ydb.cluster_config:
      ydb_bin: "{{ ydb_dir }}/bin/ydb"
      ld_library_path: "{{ ydb_dir }}/lib"
      ca_file: "{{ ydb_dir }}/certs/ca.crt"
      endpoint: "grpcs://{{ ydb_front | default(inventory_hostname) }}:2135"
      token: "{{ ydb_credentials.token }}"
      config_file: "{{ ydb_dir }}/cfg/ydbd-config-static.yaml"
      mode: replace
    run_once: true
    become: true
    register: update_cluster_config_result
    until: update_cluster_config_result is succeeded
    retries: 30
    delay: 15
    tags:
      - config
      - step-3

  - name: Delay for 4 min for cluster changes
    pause:
      seconds: 240

# Step 4. Rolling-restart all cluster nodes
  - name: Restart static nodes (step 4)
    become: true
    ansible.builtin.import_role:
      name: ydb_platform.ydb.ydbd_rolling_static
    vars:
      availability_mode: weak
      ydbops_duration: 120
    tags:
      - restart
      - storage
      - step-4

# Step 4 (continued). Rolling-restart dynamic nodes
  - name: Restart dynamic nodes (step 4)
    become: true
    ansible.builtin.import_role:
      name: ydb_platform.ydb.ydbd_rolling_dynamic
    vars:
      availability_mode: weak
      ydbops_duration: 120
    tags:
      - restart
      - dynamic
      - step-4

  - name: Delay for 2 min for cluster changes
    pause:
      seconds: 120

  - name: Get ydb token with user credentials
    ydb_platform.ydb.get_token:
      ydb_bin: "{{ ydb_dir }}/bin/ydb"
      ca_file: "{{ ydb_dir }}/certs/ca.crt"
      endpoint: "grpcs://{{ ydb_front | default(ydb_brokers | flatten(levels=1) | first) }}:2135"
      database: "/{{ ydb_domain }}"
      user: "{{ ydb_user }}"
      password: "{{ ydb_password }}"
      retry_on_ssl_error: true
    run_once: true
    register: ydb_credentials
    until: "'token' in ydb_credentials"
    retries: 5
    delay: 20
    become: true
    tags:
      - token
      - always

# Step 5. Fetch current cluster config (without --v2-internal-state)
# ydb -e grpc://<node.ydb.tech>:2135 admin cluster config fetch > config.yaml
# Result will NOT contain domains_config and blob_storage_config
  - name: Get current cluster config (step 5)
    ydb_platform.ydb.cluster_config:
      ydb_bin: "{{ ydb_dir }}/bin/ydb"
      ld_library_path: "{{ ydb_dir }}/lib"
      ca_file: "{{ ydb_dir }}/certs/ca.crt"
      endpoint: "grpcs://{{ ydb_front | default(inventory_hostname) }}:2135"
      token: "{{ ydb_credentials.token }}"
      mode: fetch
    run_once: true
    become: true
    register: v1_static_config
    until: v1_static_config is succeeded
    retries: 30
    delay: 15
    tags:
      - config
      - step-5

# Step 6. Place fetched config (V1 static configuration) on every node's filesystem
  - name: Save V1 static config locally (step 6)
    ansible.builtin.copy:
      content: "{{ v1_static_config.config.config | to_nice_yaml }}"
      dest: "{{ ansible_config_file | dirname }}/ydb_cluster_config.yaml"
      force: true
    run_once: true
    become: false
    delegate_to: localhost
    tags:
      - config
      - step-6

  - name: Save V1 static config to all nodes (step 6)
    ansible.builtin.copy:
      src: "{{ ansible_config_file | dirname }}/ydb_cluster_config.yaml"
      dest: "{{ ydb_dir }}/cfg/ydbd-config-static.yaml"
      force: true
    become: true
    tags:
      - config
      - step-6

# Step 7. Switch from --config-dir to --yaml-config and rolling-restart
  - name: Update systemd service for storage nodes (step 7)
    ansible.builtin.template:
      src: ../roles/ydbd_static/templates/ydbd-storage.service
      dest: "{{ ydb_storage_service_filename }}"
    vars:
      ydb_config_v2: false
    tags:
      - restart
      - storage
      - step-7

  - name: Reload systemd (step 7)
    ansible.builtin.systemd:
      daemon_reload: true
    tags:
      - restart
      - storage
      - step-7

# Step 7 (continued). Rolling-restart static nodes with --yaml-config
  - name: Restart static nodes (step 7)
    become: true
    ansible.builtin.import_role:
      name: ydb_platform.ydb.ydbd_rolling_static
    vars:
      availability_mode: weak
      ydbops_duration: 120
    tags:
      - restart
      - storage
      - step-7

  - name: Delay for 2 min for cluster changes
    pause:
      seconds: 120

# Step 7 (verification). Check that cluster has switched to V1
  - name: "Verify YDB Cluster has switched to V1 configuration"
    block:
    - name: "Get current YDB Cluster configuration (via URI)"
      ansible.builtin.uri:
        url: https://localhost:8765/counters/counters=config/subsystem%3Dconfigs_dispatcher/prometheus
        method: GET
        validate_certs: false
        return_content: true
        timeout: 30
        status_code: 200
      register: config_response

    - name: "Extract ConfigurationV2 line from response"
      set_fact:
        current_config_version: >-
          {{ config_response.content
            | regex_findall('^ConfigurationV2.*$', multiline=true)
            | first | default('') }}
      when: config_response.status == 200 and config_response.content is not none

    - name: "Fail if configuration could not be retrieved"
      ansible.builtin.fail:
        msg: >
          Failed to retrieve YDB configuration.
          Status: {{ config_response.status }},
          Error: {{ config_response.msg | default('No error message') }}
      when: >
        config_response.status is not defined or
        config_response.status != 200 or
        current_config_version == ''

    - name: "Check current YDB Cluster configuration has switched to V1"
      ansible.builtin.assert:
        that:
        - "current_config_version is defined"
        - "current_config_version == 'ConfigurationV2 0'"
        fail_msg: "Current cluster config is wrong: {{ current_config_version }}"    
    tags:
      - check
      - version

# Extra step 8. Update and restart dynamic nodes with --yaml-config
- hosts: "{{ groups['ydbd_dynamic'] if 'ydbd_dynamic' in groups else groups['ydb'] }}"
  become: true

  tasks:
  
  - name: Save V1 config for dynamic nodes (extra step 8)
    ansible.builtin.copy:
      content: "{{ v1_static_config.config.config | to_nice_yaml }}"
      dest: "{{ ydb_dir }}/cfg/ydbd-config-dynamic.yaml"
      force: true
    become: true
    tags:
      - config
      - step-8

  - name: Update systemd service for dynamic nodes (extra step 8)
    ansible.builtin.template:
      src: ../roles/ydbd_dynamic/templates/ydbd-dynnode.service
      dest: "/etc/systemd/system/ydbd-{{ item.dbname | default(ydb_dbname, true) }}-{{ item.instance }}.service"
    loop: "{{ ydb_dynnodes }}"
    when: "item.hosts is not defined or '{{ inventory_hostname }}' in item.hosts"
    vars:
      ydb_config_v2: false
      ydb_use_dynamic_config: false
    tags:
      - restart
      - dynamic
      - step-8

  - name: Reload systemd (extra step 8)
    ansible.builtin.systemd:
      daemon_reload: true
    tags:
      - restart
      - dynamic
      - step-8

# Extra step 8 (continued). Rolling-restart dynamic nodes
  - name: Restart dynamic nodes (extra step 8)
    become: true
    ansible.builtin.import_role:
      name: ydb_platform.ydb.ydbd_rolling_dynamic
    vars:
      availability_mode: weak
    tags:
      - restart
      - dynamic
      - step-8

# Extra step 9. Restore V1 config directory layout (undo symlink from migrate_to_v2) and backup V2 config-dir
- hosts: "{{ groups['ydbd_static'] if 'ydbd_static'  in groups else groups['ydb'] }}"
  become: true

  tasks:

  - name: wait for ydb healthcheck switch to "GOOD" status
    ydb_platform.ydb.wait_healthcheck:
      ydb_bin: "{{ ydb_dir }}/bin/ydb"
      ca_file: "{{ ydb_dir }}/certs/ca.crt"
      endpoint: "grpcs://{{ ydb_front | default(ydb_brokers | flatten(levels=1) | first) }}:2135"
      database: "/{{ ydb_domain }}"
      token: "{{ ydb_credentials.token }}"
      enforce_user_token_requirement: "{{ ydb_enforce_user_token_requirement }}"
    run_once: true
    register: healthcheck_result
    until: healthcheck_result is succeeded
    retries: 30
    delay: 10
    tags:
      - healthcheck
      - check

  - name: Check if cfg is a symlink (extra step 9)
    ansible.builtin.stat:
      path: "{{ ydb_dir }}/cfg"
    register: cfg_stat
    tags:
      - config
      - storage
      - step-9

  - name: Remove cfg symlink (created by migrate_to_v2) (extra step 9)
    ansible.builtin.file:
      path: "{{ ydb_dir }}/cfg"
      state: absent
    when: cfg_stat.stat.islnk | default(false)
    tags:
      - config
      - storage
      - step-9

  - name: Restore original cfg directory from V1 backup (extra step 9)
    ansible.builtin.shell: "mv {{ ydb_dir }}/cfg.v1 {{ ydb_dir }}/cfg"
    args:
      removes: "{{ ydb_dir }}/cfg.v1"
    when: cfg_stat.stat.islnk | default(false)
    tags:
      - config
      - storage
      - step-9

  - name: Backup V2 config-dir (extra step 9)
    ansible.builtin.shell: "mv {{ ydb_dir }}/config-dir {{ ydb_dir }}/config-dir-v2"
    args:
      removes: "{{ ydb_dir }}/config-dir"
    tags:
      - config
      - storage
      - step-9

  - name: Recommendations
    run_once: true
    ansible.builtin.debug:
      msg:
        - "Migration to V1 completed successfully."
        - "Now you can update your Ansible configuration for V1:"
        - "- Move {{ ansible_config_file | dirname }}/ydb_cluster_config.yaml to {{ ydb_config }}"
        - "- Set `ydb_config_v2: false` in inventory"
