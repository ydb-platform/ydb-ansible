---

# PLAYBOOK: ydb_platform.ydb.generate_conf
# PROPOSE : This playbook is designed to get current configs for YDB cluster
#           
# EXAMPLE:
#
# ansible-playbook ydb_platform.ydb.generate_conf
#
# WARNING: Run only on localhost
#
# REQUIRED SOFTWARE: lsblk, dd
#
- hosts: "{{ groups['ydbd_static'] if 'ydbd_static'  in groups else groups['ydb'] }}"
  vars:
    ydb_host_user: ydb

  roles:
  - role: preflight

  tasks:
  - name: Get YDB token with user credentials
    ydb_platform.ydb.get_token:
      ydb_bin: "{{ ydb_dir }}/bin/ydb"
      ca_file: "{{ ydb_dir }}/certs/ca.crt"
      endpoint: "grpcs://{{ ydb_front | default(ydb_brokers | flatten(levels=1) | first) }}:2135"
      database: "/{{ ydb_domain }}"
      user: "{{ ydb_user }}"
      password: "{{ ydb_password }}"
      retry_on_ssl_error: true
    run_once: true
    register: ydb_credentials
    until: "'token' in ydb_credentials"
    retries: 5
    delay: 20
    become: true
    become_user: "{{ ydb_host_user }}"
    tags:
      - token

  - name: Get config
    block:
      - name: Generate random temporary config file path
        set_fact:
          ydb_temp_config_path: "/tmp/ydbd-config-{{ ansible_date_time.epoch }}-{{ 999999 | random }}.yaml"
        run_once: true

      - name: Get dynamic config for YDB V1 configuration
        ydb_platform.ydb.dynconfig_version:
          ydb_bin: "{{ ydb_dir }}/bin/ydb"
          ld_library_path: "{{ ydb_dir }}/lib"
          ca_file: "{{ ydb_dir }}/certs/ca.crt"
          endpoint: "grpcs://{{ ydb_front | default(ydb_brokers | flatten(levels=1) | first) }}:2135"
          database: "/{{ ydb_domain }}"
          token: "{{ ydb_credentials.token }}"
        register: current_cluster_config
        when: not ydb_config_v2|bool

      - name: Get dynamic config for YDB V2 configuration
        ydb_platform.ydb.cluster_config:
          ydb_bin: "{{ ydb_dir }}/bin/ydb"
          ld_library_path: "{{ ydb_dir }}/lib"
          ca_file: "{{ ydb_dir }}/certs/ca.crt"
          endpoint: "grpcs://{{ ydb_front | default(inventory_hostname) }}:2135"
          token: "{{ ydb_credentials.token }}"
          mode: fetch
        run_once: true
        become: true
        become_method: sudo
        become_user: ydb
        register: current_cluster_config
        until: current_cluster_config is succeeded
        retries: 30
        delay: 15
        when: ydb_config_v2|bool | default(false)

      - name: Store file into {{ ansible_config_file | dirname }}/ydb_cluster_config.yaml
        delegate_to: localhost
        ansible.builtin.fetch:
          src: "{{ ydb_temp_config_path }}"
          dest: "{{ ansible_config_file | dirname }}/ydb_cluster_config.yaml"
        run_once: true
        when: ydb_temp_config_path is defined

    always:
      - name: cleanup temporary config file
        file:
          path: "{{ ydb_temp_config_path }}"
          state: absent
        run_once: true
        become: true
        become_method: sudo
        become_user: ydb
        when: ydb_temp_config_path is defined
